name: Deploy Seller

on:
  push:
    branches: [main]

env:
  AWS_REGION: sa-east-1
  S3_BUCKET: phantompay-prod-seller
  ECR_REPOSITORY: phantompay-prod-seller
  ECS_CLUSTER: phantompay-prod-cluster
  ECS_SERVICE: phantompay-prod-seller

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.phantompay.com.br' }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (CloudFront)
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ --delete

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Login to ECR
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push Docker (ECS)
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.phantompay.com.br' }}
        run: |
          docker build --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Force ECS deploy
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region ${{ env.AWS_REGION }} --query 'service.deployments[0].status' --output text
